<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | AquaZen</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="auth-page-logo">
    <a href="index.html"><img src="../images/logo.png" alt="AquaZen Logo" /></a>
  </div>

  <section class="auth-section">
    <div class="auth-image">
      <img src="../images/banner-2.png" alt="SUP Yoga" />
      <div class="auth-quote">
        <p>"Every wave is a new beginning."</p>
      </div>
    </div>
    <div class="auth-card">
      <a href="index.html"><img src="../images/logo.png" alt="AquaZen" class="auth-card-logo" /></a>
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join the AquaZen community today</p>
      </div>
      <form class="auth-form" onsubmit="return false;">
        <div class="form-row-2">
          <div class="form-group">
            <label><i class="fas fa-user"></i> First Name</label>
            <input type="text" placeholder="Jane" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-user"></i> Last Name</label>
            <input type="text" placeholder="Doe" />
          </div>
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-phone"></i> Phone</label>
          <input type="tel" placeholder="+1 (555) 000-0000" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-eye">
            <input type="password" id="regPass" placeholder="Min. 8 characters" />
            <i class="fas fa-eye" onclick="togglePass('regPass', this)"></i>
          </div>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Confirm Password</label>
          <div class="input-eye">
            <input type="password" id="regPass2" placeholder="Repeat password" />
            <i class="fas fa-eye" onclick="togglePass('regPass2', this)"></i>
          </div>
        </div>
        <div class="form-group">
          <label><i class="fas fa-swimmer"></i> Experience Level</label>
          <select>
            <option>Complete Beginner</option>
            <option>Some Experience</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
        </div>
        <label class="checkbox-label"><input type="checkbox" /> I agree to the <a href="#">Terms & Conditions</a></label>
        <button type="submit" class="btn-primary full-width">Create Account</button>
        <div class="divider"><span>or sign up with</span></div>
        <div class="social-auth">
          <button class="social-btn"><i class="fab fa-google"></i> Google</button>
          <button class="social-btn"><i class="fab fa-facebook"></i> Facebook</button>
          <button class="social-btn social-btn-full"><i class="fab fa-apple"></i> Apple</button>
        </div>
        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
      </form>
    </div>
  </section>

  <script src="../js/script.js"></script>
</body>
</html>
