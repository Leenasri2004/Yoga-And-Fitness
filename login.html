<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | AquaZen</title>
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="auth-page-logo">
    <a href="index.html"><img src="../images/logo.png" alt="AquaZen Logo" /></a>
  </div>

  <section class="auth-section">
    <div class="auth-image">
      <img src="../images/banner-1.png" alt="SUP Yoga" />
      <div class="auth-quote">
        <p>"The water is your mat. The sky is your ceiling."</p>
      </div>
    </div>
    <div class="auth-card">
      <a href="index.html"><img src="../images/logo.png" alt="AquaZen" class="auth-card-logo" /></a>
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your AquaZen account</p>
      </div>
      <form class="auth-form" onsubmit="return false;">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-eye">
            <input type="password" id="loginPass" placeholder="••••••••" />
            <i class="fas fa-eye" onclick="togglePass('loginPass', this)"></i>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-label"><input type="checkbox" /> Remember me</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary full-width">Sign In</button>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-auth">
          <button class="social-btn"><i class="fab fa-google"></i> Google</button>
          <button class="social-btn"><i class="fab fa-facebook"></i> Facebook</button>
          <button class="social-btn social-btn-full"><i class="fab fa-apple"></i> Apple</button>
        </div>
        <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
      </form>
    </div>
  </section>

  <script src="../js/script.js"></script>
</body>
</html>
